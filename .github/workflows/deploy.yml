name: 🚀 Deploy to Vercel

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  # Job de validation avant déploiement
  validate:
    name: ✅ Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔍 Type check
        run: npm run type-check || echo "Type checking skipped"
        continue-on-error: true

      - name: 🔨 Build test
        run: npm run build

  # Job de déploiement sur Vercel
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./

  # Job de notification de succès
  notify:
    name: 📢 Notification
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    
    steps:
      - name: ✅ Deployment Success
        run: |
          echo "🎉 Déploiement réussi sur https://djiboutigps.com"
          echo "✅ Build ID: ${{ github.sha }}"
          echo "👤 Déployé par: ${{ github.actor }}"
