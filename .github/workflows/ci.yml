name: 🔍 CI - Tests et Validation

on:
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  quality-check:
    name: 🎯 Contrôle Qualité
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔨 Build verification
        run: npm run build

      - name: ✅ Success message
        run: |
          echo "✅ Build réussi !"
          echo "📦 Taille du build : $(du -sh dist | cut -f1)"
